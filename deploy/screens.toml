version = 1

[project]
key = "richmiles-xyz"
display_name = "richmiles.xyz"

[dev]
start_command = "npx vite --port {frontend_port}"
frontend_port = 5173
backend_port = 8000
ready_url = "http://localhost:{frontend_port}"
ready_timeout_seconds = 30

[auth]
mode = "none"

[[screens]]
id = "hero"
route = "/"
description = "Hero section (top of page)"
auth_required = false
viewport = { width = 1440, height = 900 }

[[screens]]
id = "hero-mobile"
route = "/"
description = "Hero section (mobile)"
auth_required = false
viewport = { width = 390, height = 844 }

[[screens]]
id = "about"
route = "/"
description = "About section"
auth_required = false
viewport = { width = 1440, height = 900 }
scroll_to = "#about"

[[screens]]
id = "experience"
route = "/"
description = "Experience timeline"
auth_required = false
viewport = { width = 1440, height = 900 }
scroll_to = "#experience"

[[screens]]
id = "projects"
route = "/"
description = "Project carousel"
auth_required = false
viewport = { width = 1440, height = 900 }
scroll_to = "#projects"

[[screens]]
id = "contact"
route = "/"
description = "Contact section"
auth_required = false
viewport = { width = 1440, height = 900 }
scroll_to = "#contact"
