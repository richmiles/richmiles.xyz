name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner_target:
        description: "Runner target for manual runs"
        required: true
        type: choice
        default: "self-hosted-canary"
        options:
          - self-hosted-canary
          - ubuntu-latest

jobs:
  check:
    runs-on: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.runner_target == 'ubuntu-latest' && '"ubuntu-latest"' || '["self-hosted","linux","x64","do-1gb-canary"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install (web)
        run: npm install
      - name: Check (contract)
        run: make check
      - name: Lint/format/build (web)
        run: |
          npm run lint
          npm run format
          npm run build
